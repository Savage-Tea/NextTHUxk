<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 260px; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif; padding: 20px; color: #1d1d1f; }
.logo { font-size: 16px; font-weight: 700; background: linear-gradient(135deg, #7c6aef, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 4px; }
.sub { font-size: 11px; color: #86868b; margin-bottom: 14px; }
.status { font-size: 12px; color: #86868b; margin-bottom: 12px; padding: 8px; border-radius: 8px; background: rgba(0,0,0,.03); }
.status.ok { color: #34c759; }
.status.err { color: #ff3b30; }
.btn { display: block; width: 100%; padding: 10px; border-radius: 10px; background: linear-gradient(135deg, #7c6aef, #6366f1); color: #fff; border: none; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
.btn:hover { opacity: .9; }
</style>
</head>
<body>
<div class="logo">✨ NextTHUxk</div>
<div class="sub">下一代选课 · AI 智能辅助</div>
<div id="status" class="status">检测中…</div>
<button class="btn" id="launch">🚀 启动选课工作台</button>
<script src="popup.js"></script>
</body>
</html>
